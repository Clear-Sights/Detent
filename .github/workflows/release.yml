name: release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install -e . pytest
      - name: smoke test on the real wire
        run: python -m pytest tests/ -q
      - name: status trace certifies
        run: python -m lever
      - name: tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "Clear-Sights"
          git config user.email "clear-sights@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "Lever ${{ inputs.tag }}"
          git push origin "refs/tags/${{ inputs.tag }}"
          gh release create "${{ inputs.tag }}" --generate-notes --title "Lever ${{ inputs.tag }}"
